version: '3.8'

services:
  document-analyzer:
    build: ./document-analyzer
    volumes:
      - workspace:/workspace
    profiles: ["all", "docs"]

  document-creator:
    build: ./document-creator
    volumes:
      - workspace:/workspace
    profiles: ["all", "docs"]

  web-browser:
    build: ./web-browser
    volumes:
      - workspace:/workspace
    profiles: ["all", "web"]

  code-runner:
    build: ./code-runner
    volumes:
      - workspace:/workspace
    network_mode: "none"
    profiles: ["all", "dev"]

  diagram-generator:
    build: ./diagram-generator
    volumes:
      - workspace:/workspace
    profiles: ["all", "viz"]

  web-search:
    build: ./web-search
    profiles: ["all", "web"]

volumes:
  workspace:
